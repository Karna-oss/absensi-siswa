services:
  app:
    build: .
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage/app/public
    environment:
      - APP_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    expose:
      - "80"
    ports:
      - "8500:80"
    volumes:
      - .:/var/www
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.nginx-vzcan6yj5hcnil0xokqjqkjl.loadbalancer.server.port=80"
      - "traefik.http.routers.http-0-vzcan6yj5hcnil0xokqjqkjl-nginx.service=nginx-vzcan6yj5hcnil0xokqjqkjl"

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ppp
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  storage_data:
  db_data:

networks:
  coolify:
    external: true
